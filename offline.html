<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Country Inns - Offline</title>

<style>
:root {
  --bg: linear-gradient(135deg, #013220, #2e8b57);
  --card: rgba(0,0,0,0.55);
  --text: #ffffff;
  --button: #ffffff;
  --button-text: #2e8b57;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: var(--bg);
  color: var(--text);
  text-align: center;
}

.container {
  max-width: 420px;
  padding: 24px;
  background: var(--card);
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

h1 {
  margin-bottom: 10px;
}

p {
  line-height: 1.5;
  opacity: 0.95;
}

.button {
  display: inline-block;
  margin-top: 18px;
  padding: 12px 18px;
  border-radius: 10px;
  background: var(--button);
  color: var(--button-text);
  font-weight: bold;
  text-decoration: none;
  cursor: pointer;
  border: none;
}

.button:active {
  transform: scale(0.97);
}
</style>
</head>

<body>

<img src="icons/icon-192x192.png"
     width="90"
     alt="Country Inns Logo">
  
<div class="container">
  <h1>You're Offline</h1>
  <p>
    Looks like your signal has wandered off into the New Forest 🌲
We’ll reconnect you as soon as you’re back online.<br>
  </p>
  
  <button class="button" onclick="location.reload()">
    🔄 Try Again
  </button>

  <br>

  <a class="button" href="home.html" style="display:inline-block;margin-top:10px;">
    🏠 Go Home
  </a>
</div>

<script>
const savedTheme = localStorage.getItem('theme');
if (savedTheme) {
  document.documentElement.setAttribute('data-theme', savedTheme);
}
</script>

</body>
</html>

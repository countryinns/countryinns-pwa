<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <title>Customer Feedback | Country Inns</title>

  <style>
    :root {
      --bg:#0f2f1f;
      --card:#1e3a2a;
      --tile:#2c5f3e;
      --tile-hover:#3d7f55;
      --gold:#e6d8b5;
    }

    html, body {
      height:100%;
      margin:0;
    }

    body {
      background:
        radial-gradient(
          circle at 10% 10%,
          rgba(255,255,255,0.02),
          transparent 8%
        ),
        var(--bg);

      display:flex;
      flex-direction:column;
      align-items:center;
      padding:24px;

      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      color:#fff;

      overflow-y:auto;
    }

    h1 {
      margin:10px 0 5px;
      font-size:1.9rem;
      color:var(--gold);
      text-align:center;
    }

    h2 {
      margin:0 0 22px;
      font-weight:normal;
      text-align:center;
      opacity:0.9;
    }

    .card {
      width:100%;
      max-width:950px;
      padding:30px;

      background:var(--card);
      border-radius:14px;

      box-shadow:0 8px 30px rgba(0,0,0,0.45);
    }

    .pubs-grid {
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
      gap:16px;
    }

    .pub-tile {
      display:flex;
      align-items:center;
      justify-content:center;

      min-height:85px;

      text-align:center;
      text-decoration:none;
      color:#fff;

      background:var(--tile);
      padding:18px;
      border-radius:10px;

      font-weight:bold;
      font-size:1rem;

      transition:all 0.25s ease;

      box-shadow:0 2px 6px rgba(0,0,0,0.3);
    }

    .pub-tile:hover {
      background:var(--tile-hover);
      transform:translateY(-3px) scale(1.02);
    }

    .buttons {
      margin:24px 0 12px;
      text-align:center;
    }

    .buttons a {
      text-decoration:none;
      color:#fff;
      background:var(--tile);
      padding:10px 18px;
      border-radius:8px;
      transition:background 0.3s;
      display:inline-block;
      font-weight:bold;
    }

    .buttons a:hover {
      background:var(--tile-hover);
    }

    @media (max-width:600px) {
      body {
        padding:16px;
      }

      .card {
        padding:20px;
      }

      h1 {
        font-size:1.6rem;
      }
    }
  </style>
</head>

<body>

  <h1>Customer Feedback</h1>
  <h2>Select your Pub</h2>

  <div class="card">

    <div class="pubs-grid">

      <a class="pub-tile"
           <a href="https://docs.google.com/forms/d/e/1FAIpQLSckozcIPcgbZOX8rvyeqh8QfqzyPjQdQHpapFvzACa3P2rKTg/viewform?usp=pp_url&entry.136569618=The+Fighting+Cocks">Leave Feedback</a>
         The Fighting Cocks
      </a>

      <a class="pub-tile"
           <a href="https://docs.google.com/forms/d/e/1FAIpQLSckozcIPcgbZOX8rvyeqh8QfqzyPjQdQHpapFvzACa3P2rKTg/viewform?usp=pp_url&entry.136569618=The+Lamb+Inn">Leave Feedback</a>
         The Lamb Inn

      <a class="pub-tile"
          <a href="https://docs.google.com/forms/d/e/1FAIpQLSckozcIPcgbZOX8rvyeqh8QfqzyPjQdQHpapFvzACa3P2rKTg/viewform?usp=pp_url&entry.136569618=The+Fighting+Cocks">Leave Feedback</a>

      <a class="pub-tile"

         The Woolpack
      </a>

      <a class="pub-tile"
           <a href="https://docs.google.com/forms/d/e/1FAIpQLSckozcIPcgbZOX8rvyeqh8QfqzyPjQdQHpapFvzACa3P2rKTg/viewform?usp=pp_url&entry.136569618=The+Fighting+Cocks">Leave Feedback</a>
         The Trusty Servant

      <a class="pub-tile"
           <a href="https://docs.google.com/forms/d/e/1FAIpQLSckozcIPcgbZOX8rvyeqh8QfqzyPjQdQHpapFvzACa3P2rKTg/viewform?usp=pp_url&entry.136569618=The+Fighting+Cocks">Leave Feedback</a>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Trusty Servant Inn – Upcoming Events</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: linear-gradient(180deg, #2e472e, #1e2b1e);
      color: #f4f4f4;
      text-align: center;
    }

    header {
      padding: 1.5rem;
      background: rgba(34, 49, 34, 0.9);
      color: #e6d8b5;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
    }

    .card-grid {
      display: flex;
      flex-direction: column; /* stacked vertically */
      align-items: center;    /* centred horizontally */
      gap: 2rem;
      margin: 2rem 0;
    }

    .card {
      background: #2e472e;
      border-radius: 12px;
      padding: 1.2rem;
      max-width: 420px;
      width: 90%;
      text-align: center;
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin-bottom: 1rem;
    }

    .card h3 {
      margin: 0.5rem 0;
      color: #e6d8b5;
    }

    .card p {
      font-size: 0.95rem;
      line-height: 1.5;
      margin: 0.6rem 0;
    }

    .card .highlight {
      font-style: italic;
      color: #e6d8b5;
    }

    .card-link {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.75rem 1.3rem;
      background: #e6d8b5;
      color: #2e472e;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      transition: background 0.3s ease;
    }

    .card-link:hover {
      background: #f2e6c8;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin: 2rem auto;
      max-width: 300px;
    }

    .buttons a {
      display: block;
      background: #3c5a3c;
      color: #fff;
      text-decoration: none;
      padding: 1rem;
      border-radius: 8px;
      font-weight: bold;
      transition: background 0.3s;
    }

    .buttons a:hover {
      background: #4f7c4f;
    }
  </style>
</head>
<body>
  <header>
    <h1>Upcoming Events</h1>
  </header>

  <main>
    <div class="card-grid">
      <div class="card">
        <img src="Jukebox-Friday.png" alt="🎶Jukebox Friday, every Friday from 6pm till 11pm">
        <h3>Jukebox Friday</h3>
        <p>
           Jukebox Fridays at The Trusty Servant – Your Music, Your Night! 🍻
          <p>
    <a href="https://thetrustyservant.co.uk/food/#restaurant_form"
       class="card-link">
      Book your table now
    </a>
  </p>

  <p>or call <strong>02380 812137</strong></p>
    </div>
      
  </main>

<div class="buttons">
  <a href="../../trustyservant.html">⬅ Back to Pub Page</a>
  <a href="../../home.html">⬅ Back to Home</a>
</div>

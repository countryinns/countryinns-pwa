<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Country Inns Executive Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f6f8;
  padding: 20px;
}
h1 { text-align:center; margin-bottom:10px; }
.sub { text-align:center; color:#666; margin-bottom:25px; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card {
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.metric {
  font-size:1.6rem;
  font-weight:bold;
}

canvas { max-height:260px; }

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  padding:8px;
  border-bottom:1px solid #eee;
}

th { background:#f0f0f0; }

button {
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2e7d32;
  color:white;
  cursor:pointer;
}
.actions { text-align:center; margin:20px 0; }
</style>
</head>

<body>

<h1>📊 Executive Dashboard V3 (LIVE)</h1>
<div class="sub">Live Data from All Country Inns Pubs</div>

<div class="grid">

<div class="card">
  <div class="metric" id="opens">0</div>
  <div>App Opens</div>
</div>

<div class="card">
  <div class="metric" id="bookings">0</div>
  <div>Booking Clicks 🍽️</div>
</div>

<div class="card">
  <div class="metric" id="installs">0</div>
  <div>Installs 📲</div>
</div>

<div class="card">
  <div class="metric" id="pubs">0</div>
  <div>Pub Interactions 🍺</div>
</div>

</div>

<br>

<div class="grid">

<div class="card">
  <h3>📈 Weekly Activity</h3>
  <canvas id="trendChart"></canvas>
</div>

<div class="card">
  <h3>📊 Event Breakdown</h3>
  <canvas id="eventChart"></canvas>
</div>

</div>

<br>

<div class="card">
  <h3>🏆 Pub Leaderboard</h3>
  <table id="leaderboard">
    <tr><th>Pub</th><th>Visits</th></tr>
  </table>
</div>

<div class="actions">
<button onclick="location.reload()">🔄 Refresh</button>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbz15g-BlmSiJFbsgFheceEEqz44izf-itYNQTefpg6z7eP_J3ufDTlsKhm5id0DG6Bg/exec";

/* =========================
   LOAD CLOUD DATA
========================= */
async function getData() {
  const res = await fetch(API_URL);
  try {
  return await res.json();
} catch (e) {
  return [];
}
}

function count(data, event) {
  return data.filter(x => x.event === event).length;
}

/* =========================
   INIT
========================= */
async function init() {
  const data = await getData();

  document.getElementById("opens").innerText = count(data,"app_open");
  document.getElementById("bookings").innerText = count(data,"booking_click");
  document.getElementById("installs").innerText = count(data,"install_click");
  document.getElementById("pubs").innerText =
    data.filter(x=>x.event==="pub_visit").length;

  renderCharts(data);
  renderLeaderboard(data);
}

/* =========================
   CHARTS
========================= */
function renderCharts(data) {

  const events = ["app_open","booking_click","install_click","pub_visit"];

  new Chart(document.getElementById("eventChart"), {
    type: "bar",
    data: {
      labels: events,
      datasets: [{
        label: "Events",
        data: events.map(e => count(data,e))
      }]
    }
  });

  const days = [...Array(7)].map((_,i)=>{
    const d=new Date();
    d.setDate(d.getDate()-i);
    return d.toDateString();
  }).reverse();

  const trend = days.map(day =>
    data.filter(x => new Date(x.time).toDateString() === day).length
  );

  new Chart(document.getElementById("trendChart"), {
    type:"line",
    data:{
      labels:days.map(d=>d.slice(0,10)),
      datasets:[{ label:"Activity", data:trend, tension:0.3 }]
    }
  });
}

/* =========================
   LEADERBOARD
========================= */
function renderLeaderboard(data) {

  const pubs = {};

  data.forEach(e=>{
    if(e.event==="pub_visit"){
      const p=e.pub || "Unknown";
      pubs[p]=(pubs[p]||0)+1;
    }
  });

  const sorted = Object.entries(pubs).sort((a,b)=>b[1]-a[1]);

  const table = document.getElementById("leaderboard");

  sorted.forEach(([pub,count])=>{
    const row=document.createElement("tr");
    row.innerHTML=`<td>${pub}</td><td>${count}</td>`;
    table.appendChild(row);
  });
}

init();

</script>

</body>
</html>

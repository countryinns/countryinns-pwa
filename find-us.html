<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Country Inns Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    #sidebar {
      width: 300px;
      overflow-y: auto;
      padding: 15px;
      background: #f9f9f9;
    }

    #map {
      flex: 1;
    }

    .pub-item {
      cursor: pointer;
      margin-bottom: 10px;
      padding: 5px;
      border-radius: 6px;
    }

    .pub-item:hover {
      background: #eee;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      #sidebar {
        width: 100%;
        height: 40%;
      }

      #map {
        height: 60%;
      }
    }
  </style>
</head>

<body>
<div class="container">
  <div id="sidebar">
    <h2>Find your nearest Country Inns Pub</h2>
    <div id="pub-list"></div>
  </div>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const pubs = [
  { name: "The Bold Forester", address: "Beaulieu Rd, Marchwood, Southampton SO40 4UQ", lat: 50.8748207, lng: -1.4652314 },
  { name: "The Royal Oak", address: "Hilltop, Beaulieu, Brockenhurst SO42 7YR", lat: 50.8266350, lng: -1.4316368 },
  { name: "The Trusty Servant Inn", address: "Minstead, Lyndhurst SO43 7FY", lat: 50.8982220, lng: -1.6011497 },
  { name: "The New Forest Inn", address: "Emery Down, Lyndhurst SO43 7DY", lat: 50.8743130, lng: -1.5954882 },
  { name: "The Lamb Inn", address: "Forest Rd, Nomansland SP5 2BP", lat: 50.9547063, lng: -1.6407358 },
  { name: "The Woolpack", address: "Ringwood Rd, Sopley BH23 7AX", lat: 50.7712926, lng: -1.7788377 },
  { name: "The Fighting Cocks", address: "Godshill, Fordingbridge SP6 2LL", lat: 50.9336840, lng: -1.7506322 }
];

const map = L.map('map').setView([50.8746, -1.5936], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

const pubListDiv = document.getElementById("pub-list");

pubs.forEach(pub => {

  const marker = L.marker([pub.lat, pub.lng]).addTo(map);

  // ✅ FIXED: Use coordinates instead of address
  const mapsLink = `https://www.google.com/maps/dir/?api=1&destination=${pub.lat},${pub.lng}`;

  marker.bindPopup(`
    <strong>${pub.name}</strong><br>
    ${pub.address}<br>
    <a href="${mapsLink}" target="_blank">🧭 Navigate</a>
  `);

  const listItem = document.createElement("div");
  listItem.className = "pub-item";
  listItem.textContent = pub.name;

  listItem.addEventListener("click", () => {
    map.setView([pub.lat, pub.lng], 15);
    marker.openPopup();
  });

  pubListDiv.appendChild(listItem);
});
</script>

</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <title>Book a Table | Country Inns</title>

  <style>
    :root { --bg:#0f2f1f }

    html, body {
      height:100%;
      margin:0;
    }

    body {
      background: radial-gradient(
        circle at 10% 10%,
        rgba(255,255,255,0.02),
        transparent 8%
      ), var(--bg);

      display:flex;
      flex-direction:column;
      align-items:center;
      padding:24px;

      font-family:system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial;
      color:#fff;

      overflow-y:auto;
    }

    h1 {
      margin:10px 0 5px;
      font-size:1.8rem;
      color:#e6d8b5;
      text-align:center;
    }

    h2 {
      margin:0 0 20px;
      font-weight:normal;
      text-align:center;
    }

    .card {
      width:100%;
      max-width:900px;
      padding:30px;

      background:#1e3a2a;
      border-radius:10px;

      box-shadow:0 8px 30px rgba(0,0,0,0.45);
    }

    .pubs-grid {
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
      gap:15px;
    }

    .pub-tile {
      display:block;
      text-align:center;
      text-decoration:none;
      color:#fff;

      background:#2c5f3e;
      padding:18px;
      border-radius:8px;

      font-weight:bold;
      transition:all 0.25s ease;

      box-shadow:0 2px 6px rgba(0,0,0,0.3);
    }

    .pub-tile:hover {
      background:#3d7f55;
      transform:translateY(-3px);
    }

    .buttons {
      margin:24px 0 12px;
      text-align:center;
    }

    .buttons a {
      text-decoration:none;
      color:#fff;
      background:#2c5f3e;
      padding:10px 18px;
      border-radius:6px;
      transition:background 0.3s;
      display:inline-block;
    }

    .buttons a:hover {
      background:#3d7f55;
    }

  </style>
</head>

<body>

  <h1>Book your table</h1>
  <h2>Select your pub</h2>

  <div class="card">

    <div class="pubs-grid">

      <a class="pub-tile" href="https://thefightingcockspub.co.uk/food/#restaurant_form">The Fighting Cocks</a>
      <a class="pub-tile" href="https://www.thelambnomansland.co.uk/food/#restaurant_form">The Lamb Inn</a>
      <a class="pub-tile" href="https://www.theroyaloakbeaulieu.co.uk/food/#restaurant_form">The Royal Oak</a>
      <a class="pub-tile" href="https://www.thewoolpacksopley.co.uk/food/#restaurant_form">The Woolpack</a>
      <a class="pub-tile" href="https://www.thetrustyservant.co.uk/food/#restaurant_form">The Trusty Servant</a>
      <a class="pub-tile" href="https://www.thenewforestinn.co.uk/food/#_restaurant_form">The New Forest Inn</a>
      <a class="pub-tile" href="https://www.theboldforesternewforest.co.uk/food/#restaurant_form">The Bold Forester</a>

    </div>

  </div>

  <div class="buttons">
    <a href="home.html">⬅ Back to Home</a>
  </div>

</body>
</html>
